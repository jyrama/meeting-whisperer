cpu = []  # cubecl-cpu removed to avoid lzma-sys links conflict with yt-dlp
cuda = ["cubecl-cuda"]
cuda-ptx-wmma = ["cubecl-cuda?/ptx-wmma"]
default = [
    "std",
    "stdlib",
    "cubecl-core/default",
    "cubecl-cuda?/default",
    "cubecl-hip?/default",
    "cubecl-wgpu?/default",
]
exclusive-memory-only = ["cubecl-wgpu?/exclusive-memory-only"]
hip = ["cubecl-hip"]
hip-rocwmma = ["cubecl-hip?/rocwmma"]
profile-tracy = [
    "cubecl-runtime/profile-tracy",
    "cubecl-wgpu?/profile-tracy",
]
spirv-dump = ["cubecl-wgpu/spirv-dump"]
std = [
    "cubecl-core/std",
    "cubecl-wgpu?/std",
    "cubecl-cuda?/std",
]
stdlib = ["cubecl-std"]
template = ["cubecl-core/template"]
test-runtime = ["cubecl-wgpu"]
tracing = [
    "cubecl-core/tracing",
    "cubecl-cuda?/tracing",
    "cubecl-hip?/tracing",
    "cubecl-wgpu?/tracing",
]
wgpu = ["cubecl-wgpu"]
wgpu-msl = [
    "wgpu",
    "cubecl-wgpu/msl",
]
wgpu-spirv = [
    "wgpu",
    "cubecl-wgpu/spirv",
]

[lib]
name = "cubecl"
path = "src/lib.rs"

[dependencies.cubecl-core]
version = "=0.9.0"
