[package]
edition = "2024"
name = "cubecl"
version = "0.9.0"
authors = ["nathanielsimard <nathaniel.simard.42@gmail.com>"]
build = "build.rs"
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Multi-platform high-performance compute language extension for Rust."
readme = "README.md"
keywords = [
    "gpu",
    "cuda",
    "wgpu",
    "gpgpu",
    "tensor",
]
categories = [
    "science",
    "mathematics",
    "algorithms",
]
license = "MIT OR Apache-2.0"
repository = "https://github.com/tracel-ai/cubecl"
resolver = "2"

[features]
